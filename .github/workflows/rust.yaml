name: rust

on:
  push:
    branches: [main]
    paths:
      - 'rust/**'
      - '.github/workflows/rust.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'rust/**'
      - '.github/workflows/rust.yaml'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macOS-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: rust
    env:
      RUST_BACKTRACE: 1
    steps:
      - uses: actions/checkout@v4

      - name: Install HDF5 (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libhdf5-dev pkg-config

      - name: Install HDF5 (macOS)
        if: runner.os == 'macOS'
        run: brew install hdf5 pkg-config

      - name: Install HDF5 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          C:\msys64\usr\bin\bash.exe -lc "pacman -Sy --noconfirm --needed mingw-w64-ucrt-x86_64-hdf5 mingw-w64-ucrt-x86_64-pkgconf"
          "PKG_CONFIG_PATH=/ucrt64/lib/pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "C:\msys64\ucrt64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace

      - name: cargo build --release
        run: cargo build --release
