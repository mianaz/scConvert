name: pkgdown

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    concurrency:
      group: pkgdown-${{ github.ref }}
      cancel-in-progress: true
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      _R_CHECK_FORCE_SUGGESTS_: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libhdf5-dev

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # See r-cmd-check.yaml for rationale: BPCells subdir + pak don't mix.
      - name: Pre-install BPCells from r-universe
        shell: Rscript {0}
        run: |
          install.packages(
            "BPCells",
            repos = c(
              bnprks = "https://bnprks.r-universe.dev",
              CRAN   = "https://cloud.r-project.org"
            )
          )

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # See r-cmd-check.yaml for the rationale behind excluding Enhances.
          dependencies: 'c("Depends", "Imports", "LinkingTo", "Suggests")'
          extra-packages: any::pkgdown, local::.
          cache-version: 1

      - name: Build site
        shell: Rscript {0}
        # Every article in vignettes/articles/ is knitted locally against real
        # data (local h5ad/h5seurat files, NanoString S3, CELLxGENE Census S3)
        # that is not available in CI, so we skip all of them here and let the
        # next step restore the committed pre-built HTML into docs/articles/.
        # Only top-level vignettes (e.g. getting-started, which uses shipped
        # system.file() test data) are knitted in CI.
        run: |
          pkgdown::clean_site(force = TRUE)
          pkgdown::build_home()
          pkgdown::build_reference()
          pkgdown::build_news()
          pkg <- pkgdown::as_pkgdown(".")
          for (nm in pkg$vignettes$name) {
            if (startsWith(nm, "articles/")) next
            pkgdown::build_article(nm, pkg = pkg)
          }

      - name: Restore pre-built articles
        shell: bash
        run: |
          mkdir -p docs/articles
          for f in vignettes/articles/*.html; do
            [ -f "$f" ] && cp "$f" docs/articles/ && echo "Restored: $(basename $f)"
          done

      - name: Deploy to GitHub pages
        uses: JamesIves/github-pages-deploy-action@v4.6.8
        with:
          # clean: true purges stale files (e.g., NOTES.html, findings.html
          # from previous deploys) so the live site matches the current build.
          clean: true
          branch: gh-pages
          folder: docs
