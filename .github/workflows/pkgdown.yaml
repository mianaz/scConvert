name: pkgdown

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      _R_CHECK_FORCE_SUGGESTS_: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libhdf5-dev

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # See r-cmd-check.yaml for rationale: BPCells subdir + pak don't mix.
      - name: Pre-install BPCells from r-universe
        shell: Rscript {0}
        run: |
          install.packages(
            "BPCells",
            repos = c(
              bnprks = "https://bnprks.r-universe.dev",
              CRAN   = "https://cloud.r-project.org"
            )
          )

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # See r-cmd-check.yaml for the rationale behind excluding Enhances.
          dependencies: 'c("Depends", "Imports", "LinkingTo", "Suggests")'
          extra-packages: any::pkgdown
          cache-version: 1

      - name: Build site
        run: pkgdown::build_site(new_process = FALSE)
        shell: Rscript {0}

      - name: Deploy to GitHub pages
        uses: JamesIves/github-pages-deploy-action@v4.6.8
        with:
          clean: false
          branch: gh-pages
          folder: docs
