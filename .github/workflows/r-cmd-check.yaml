name: R-CMD-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (R ${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest, r: 'release'}
          - {os: ubuntu-latest, r: 'oldrel'}
          - {os: macOS-latest, r: 'release'}
          - {os: macOS-latest, r: 'oldrel'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      # Accept missing Suggests at check time. Some (tiledbsoma) need a heavy
      # system TileDB C++ stack that may not install on every runner; the R
      # code gates every optional Suggest via requireNamespace() anyway.
      _R_CHECK_FORCE_SUGGESTS_: false

    steps:
      - uses: actions/checkout@v4

      # Install pandoc before setup-r-dependencies. The r-lib action runs a
      # "check if pandoc is needed" step that calls pak::pkg_deps() with the
      # hardcoded spec list(direct = "all"), which expands to include
      # Enhances — and tiledbsoma (in our Enhances) is unresolvable on the
      # macOS runners. Pre-installing pandoc short-circuits that check.
      - uses: r-lib/actions/setup-pandoc@v2

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libhdf5-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install hdf5

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      # Pre-install BPCells from its r-universe binary. pak's handling of
      # github::user/repo/subdir refs (BPCells lives at bnprks/BPCells/r)
      # repacks the GitHub zipball into a tarball and has historically
      # failed with "Failed to uncompress"; the r-universe publishes a
      # proper binary tarball that installs cleanly. Once BPCells is on the
      # library path, pak/setup-r-dependencies skips it.
      - name: Pre-install BPCells from r-universe
        shell: Rscript {0}
        run: |
          install.packages(
            "BPCells",
            repos = c(
              bnprks = "https://bnprks.r-universe.dev",
              CRAN   = "https://cloud.r-project.org"
            )
          )

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # "all" would pull in Enhances (tiledbsoma), which needs a heavy
          # TileDB C++ stack that is not available on all runners. The R
          # code gates tiledbsoma behind requireNamespace() so Enhances is
          # the right place for it.
          dependencies: 'c("Depends", "Imports", "LinkingTo", "Suggests")'
          extra-packages: any::rcmdcheck
          cache-version: 1

      - uses: r-lib/actions/check-r-package@v2
        with:
          # error-on "error" (not "warning"). R CMD check currently reports
          # compile-time WARNINGs from -Wformat-truncation on snprintf into
          # fixed-size buffers in sc_zarr.c / sc_loom.c / etc., plus two
          # vignette-build WARNINGs from --no-build-vignettes (no inst/doc
          # directory). None of these are real correctness failures; they
          # are upstream static-analysis noise and a CI-only side effect.
          # Real bugs still fail via ERROR.
          error-on: '"error"'
          # Skip vignette building under R CMD check. Vignette correctness is
          # exercised by pkgdown::build_site() in the separate pkgdown workflow,
          # where we control the R/HDF5 environment. Building them inside
          # rcmdcheck has repeatedly caught version-sensitive breakage unrelated
          # to the package itself (hdf5r + HDF5 2.1.1 on macOS drops metadata
          # columns; older Seurat's Assays() dispatch differs from 5.x).
          build_args: '"--no-build-vignettes"'
          args: 'c("--no-manual", "--as-cran", "--no-vignettes")'
