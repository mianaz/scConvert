name: R-CMD-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (R ${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest, r: 'devel'}
          - {os: ubuntu-latest, r: 'release'}
          - {os: ubuntu-latest, r: 'oldrel'}
          # HDF5 1.14+ is required: hdf5r close_all() segfaults at the C
          # ABI on libhdf5 1.10.x (Ubuntu 22.04's libhdf5-dev) when closing
          # files with many open child IDs. Not a tryCatch-able failure.
          # ubuntu-latest, macOS, and Windows all ship 1.14.x. If you need
          # 1.10 coverage, use Bioconductor's Rhdf5lib (which bundles 1.14).
          - {os: macOS-latest, r: 'release'}
          - {os: macOS-latest, r: 'oldrel'}
          - {os: windows-latest, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      # Accept missing Suggests at check time. Some (tiledbsoma) need a heavy
      # system TileDB C++ stack that may not install on every runner; the R
      # code gates every optional Suggest via requireNamespace() anyway.
      _R_CHECK_FORCE_SUGGESTS_: false

    steps:
      - uses: actions/checkout@v4

      # Install pandoc before setup-r-dependencies. The r-lib action runs a
      # "check if pandoc is needed" step that calls pak::pkg_deps() with the
      # hardcoded spec list(direct = "all"), which expands to include
      # Enhances — and tiledbsoma (in our Enhances) is unresolvable on the
      # macOS runners. Pre-installing pandoc short-circuits that check.
      - uses: r-lib/actions/setup-pandoc@v2

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libhdf5-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install hdf5

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          C:\msys64\usr\bin\bash.exe -lc "pacman -Sy --noconfirm --needed mingw-w64-ucrt-x86_64-hdf5 mingw-w64-ucrt-x86_64-zlib"

      - name: Configure pkg-config (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "PKG_CONFIG_PATH=/ucrt64/lib/pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "C:\msys64\ucrt64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      # Build the standalone scconvert CLI binary and install it to inst/bin/
      # so it ships with the source tarball that rcmdcheck builds. Without
      # this step, sc_find_cli() returns NULL on CI and the entire
      # test-cli-integration.R file is skipped.
      - name: Build CLI binary (Linux + macOS)
        if: runner.os != 'Windows'
        run: |
          cd src
          make -f Makefile.cli
          make -f Makefile.cli install-bin

      # Windows build runs inside MSYS2 bash because the toolchain (gcc, make,
      # pkg-config) and HDF5 install live under /ucrt64. We ship the
      # ucrt64 runtime DLLs alongside scconvert.exe so users without MSYS2
      # can run it -- Windows resolves implicit-load DLLs from the exe's own
      # directory first, so colocation in inst/bin/ is sufficient.
      #
      # Multi-line bash scripts are piped to `bash -ls` via stdin rather than
      # passed via `bash -lc "..."` because pwsh's native argument parsing
      # mangles backslash-quote escapes (`\"\$dll\"` becomes `\ ... done`
      # on the bash side, breaking the while-loop in fun ways).
      - name: Build CLI binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          C:\msys64\usr\bin\bash.exe -lc "pacman -S --noconfirm --needed mingw-w64-ucrt-x86_64-gcc mingw-w64-ucrt-x86_64-pkgconf make"

          # CHERE_INVOKING keeps the bash login shell in the invoked cwd
          # instead of $HOME; MSYSTEM=UCRT64 selects the ucrt64 toolchain.
          $env:CHERE_INVOKING = "1"
          $env:MSYSTEM = "UCRT64"
          $script = @'
          set -e
          cd src
          make -f Makefile.cli
          make -f Makefile.cli install-bin
          cd ..
          # ldd lists every implicit-load DLL with its full path; keep only
          # the /ucrt64/ ones so we don't bundle Windows system DLLs.
          ldd inst/bin/scconvert.exe | awk '/ucrt64/ {print $3}' | while read dll; do
            cp "$dll" inst/bin/
          done
          ls -la inst/bin/
          # Smoke test: if a runtime DLL is missing the loader fails with
          # STATUS_DLL_NOT_FOUND (0xC0000135) at exec time -- catch that here.
          ./inst/bin/scconvert.exe --version
          '@
          $script | C:\msys64\usr\bin\bash.exe -ls
          if ($LASTEXITCODE -ne 0) {
            throw "Windows CLI build/smoke-test failed (exit $LASTEXITCODE)"
          }

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      # Pre-install BPCells from its r-universe binary. pak's handling of
      # github::user/repo/subdir refs (BPCells lives at bnprks/BPCells/r)
      # repacks the GitHub zipball into a tarball and has historically
      # failed with "Failed to uncompress"; the r-universe publishes a
      # proper binary tarball that installs cleanly. Once BPCells is on the
      # library path, pak/setup-r-dependencies skips it.
      - name: Pre-install BPCells from r-universe
        shell: Rscript {0}
        run: |
          install.packages(
            "BPCells",
            repos = c(
              bnprks = "https://bnprks.r-universe.dev",
              CRAN   = "https://cloud.r-project.org"
            )
          )

      # Strip BPCells from Suggests before pak resolves dependencies.
      # BPCells is already pre-installed from r-universe above; pak cannot
      # resolve it from GitHub subdir refs (uncompress failure) and may not
      # pick up Additional_repositories from DESCRIPTION on all platforms.
      - name: Hide BPCells from pak dependency resolution
        shell: Rscript {0}
        run: |
          desc <- readLines("DESCRIPTION")
          desc <- desc[!grepl("^\\s*BPCells", desc)]
          writeLines(desc, "DESCRIPTION")

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # "all" would pull in Enhances (tiledbsoma), which needs a heavy
          # TileDB C++ stack that is not available on all runners. The R
          # code gates tiledbsoma behind requireNamespace() so Enhances is
          # the right place for it.
          dependencies: 'c("Depends", "Imports", "LinkingTo", "Suggests")'
          extra-packages: any::rcmdcheck
          cache-version: 1

      - uses: r-lib/actions/check-r-package@v2
        with:
          # error-on "error" (not "warning"). R CMD check currently reports
          # compile-time WARNINGs from -Wformat-truncation on snprintf into
          # fixed-size buffers in sc_zarr.c / sc_loom.c / etc., plus two
          # vignette-build WARNINGs from --no-build-vignettes (no inst/doc
          # directory). None of these are real correctness failures; they
          # are upstream static-analysis noise and a CI-only side effect.
          # Real bugs still fail via ERROR.
          error-on: '"error"'
          # Skip vignette building under R CMD check. Vignette correctness is
          # exercised by pkgdown::build_site() in the separate pkgdown workflow,
          # where we control the R/HDF5 environment. Building them inside
          # rcmdcheck has repeatedly caught version-sensitive breakage unrelated
          # to the package itself (hdf5r + HDF5 2.1.1 on macOS drops metadata
          # columns; older Seurat's Assays() dispatch differs from 5.x).
          build_args: '"--no-build-vignettes"'
          args: 'c("--no-manual", "--as-cran", "--no-vignettes")'
